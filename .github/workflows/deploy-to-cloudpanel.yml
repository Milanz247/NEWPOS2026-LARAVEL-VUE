name: Deploy to CloudPanel

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, intl

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Debug SSH host
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "Warning: SSH_HOST secret is empty or not set" >&2
          else
            echo "Attempting to resolve ${{ secrets.SSH_HOST }} (this output may redact the secret)"
            if command -v getent >/dev/null 2>&1; then
              echo "getent hosts result:"; getent hosts "${{ secrets.SSH_HOST }}" || true
            fi
            if command -v nslookup >/dev/null 2>&1; then
              echo "nslookup result:"; nslookup "${{ secrets.SSH_HOST }}" || true
            fi
            echo "ping (1 packet) result:"; ping -c 1 "${{ secrets.SSH_HOST }}" || true
          fi

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts || echo "ssh-keyscan failed: host may not resolve or be unreachable" >&2

      - name: Deploy with rsync
        run: |
          # Adjust the target path if your domain is different
          # Typical CloudPanel path: /home/<user>/htdocs/<domain>/
          RSYNC_RSH="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=10"
          rsync -e "$RSYNC_RSH" -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='storage/' \
            . ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/htdocs/${{ secrets.DOMAIN_NAME }}/

      - name: Post-Deploy Commands
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /home/${{ secrets.SSH_USER }}/htdocs/${{ secrets.DOMAIN_NAME }} && \
          mkdir -p storage/framework/{sessions,views,cache} && \
          php artisan migrate --force && \
          php artisan config:cache && \
          php artisan route:cache && \
          php artisan view:cache && \
          php artisan db:seed --class=DefaultCategoriesSeeder --force"

     