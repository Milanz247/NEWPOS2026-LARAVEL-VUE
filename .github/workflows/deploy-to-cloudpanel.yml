name: Deploy to CloudPanel

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, bcmath, curl, zip, intl, readline, openssl
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Composer Dependencies
        run: composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --no-scripts --optimize-autoloader

      - name: Install NPM Dependencies & Build
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Deploy to Server via SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "."
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: ${{ secrets.REMOTE_PATH }}
          EXCLUDE: "/node_modules/, /tests/, /.git/, /.github/, /storage/logs/, /storage/framework/cache/, /storage/framework/sessions/, /storage/framework/views/, .env, /database/database.sqlite"

      - name: Post-Deployment Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV_FILE_CONTENT
          script: |
            cd ${{ secrets.REMOTE_PATH }}
            if [ -z "$ENV_FILE_CONTENT" ]; then
              echo "ERROR: ENV_FILE secret is empty!"
              exit 1
            fi
            printf "%s" "$ENV_FILE_CONTENT" > .env
            ls -lh .env
            mkdir -p storage/framework/{sessions,views,cache}
            chmod -R 775 storage bootstrap/cache
            php artisan optimize:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
